name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. TypeScript gate
  # ─────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────
  # 2. Python agent lint gate
  # ─────────────────────────────────────────────────────────────────
  python-lint:
    name: Python agent lint
    runs-on: ubuntu-22.04
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check agents/

  # ─────────────────────────────────────────────────────────────────
  # 3. Windows .exe / NSIS installer <- ONLY RELEASE TARGET
  # This is a Windows-only app (NSIS installer bundle only).
  # Linux and macOS builds are intentionally excluded.
  # ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows NSIS installer
    needs: [typecheck, python-lint]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Node dependencies
        run: npm ci

      - name: Generate icons (PNG + ICO)
        run: python scripts/generate_icons.py
        shell: pwsh

      - name: Set up Python for sidecar bundle
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install sidecar build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          if (Test-Path "agents/requirements.txt") {
            python -m pip install -r agents/requirements.txt
          }
        shell: pwsh

      - name: Bundle Python agent sidecar
        run: ./scripts/build-sidecar.ps1
        shell: pwsh

      - name: Verify sidecar bundle
        run: |
          if (-not (Test-Path "src-tauri/resources/zq-agent-router.exe")) {
            throw "Missing bundled sidecar executable."
          }
        shell: pwsh

      - name: Build Tauri NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ZQ Master Bridge ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: "--target x86_64-pc-windows-msvc --bundles nsis"
