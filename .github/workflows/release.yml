name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Python agent lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint:agents

  build:
    name: Build (${{ matrix.os }})
    needs: [typecheck, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Node dependencies
        run: npm ci

      - name: Generate Tauri icons
        shell: python
        run: |
          import os, struct, zlib

          icons_dir = os.path.join("src-tauri", "icons")
          os.makedirs(icons_dir, exist_ok=True)

          def make_rgba_png(size, r, g, b, a=255):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xFFFFFFFF
                  return struct.pack(">I", len(data)) + name + data + struct.pack(">I", c)
              sig = b"\x89PNG\r\n\x1a\n"
              ihdr_data = struct.pack(">IIBBBBB", size, size, 8, 6, 0, 0, 0)
              ihdr = chunk(b"IHDR", ihdr_data)
              row = b"\x00" + bytes([r, g, b, a]) * size
              raw = row * size
              idat = chunk(b"IDAT", zlib.compress(raw))
              iend = chunk(b"IEND", b"")
              return sig + ihdr + idat + iend

          sizes = [32, 128, 256]
          png_files = {}
          for s in sizes:
              data = make_rgba_png(s, 100, 150, 200)
              path = os.path.join(icons_dir, f"{s}x{s}.png")
              with open(path, "wb") as f:
                  f.write(data)
              png_files[s] = data
              print(f"Created {path}")

          # Also create @2x variants
          for s in [128]:
              data = make_rgba_png(s * 2, 100, 150, 200)
              path = os.path.join(icons_dir, f"{s}x{s}@2x.png")
              with open(path, "wb") as f:
                  f.write(data)
              print(f"Created {path}")

          # Create icon.ico with multiple sizes (16, 32, 48, 256)
          ico_sizes = [16, 32, 48, 256]
          png_data_list = []
          for s in ico_sizes:
              data = make_rgba_png(s, 100, 150, 200)
              png_data_list.append((s, data))

          # ICO format: header + directory entries + image data
          num_images = len(png_data_list)
          header_size = 6
          dir_entry_size = 16
          data_offset = header_size + dir_entry_size * num_images

          ico_header = struct.pack("<HHH", 0, 1, num_images)
          dir_entries = b""
          image_data = b""
          current_offset = data_offset

          for (s, data) in png_data_list:
              w = 0 if s == 256 else s
              h = 0 if s == 256 else s
              dir_entries += struct.pack("<BBBBHHII", w, h, 0, 0, 1, 32, len(data), current_offset)
              image_data += data
              current_offset += len(data)

          ico_path = os.path.join(icons_dir, "icon.ico")
          with open(ico_path, "wb") as f:
              f.write(ico_header + dir_entries + image_data)
          print(f"Created {ico_path}")

          # Create icon.png (32x32 for general use)
          icon_png_path = os.path.join(icons_dir, "icon.png")
          with open(icon_png_path, "wb") as f:
              f.write(make_rgba_png(32, 100, 150, 200))
          print(f"Created {icon_png_path}")

          print("All icons created successfully")

      - name: Build Tauri app
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
