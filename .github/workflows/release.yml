name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # Frontend type-check (fast gate)
  # ------------------------------------------------------------------
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Node dependencies
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit

  # ------------------------------------------------------------------
  # Build Tauri desktop app (Windows, macOS, Linux)
  # ------------------------------------------------------------------
  build:
    name: Build (${{ matrix.platform }})
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Node dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: |
          python3 - <<'PYEOF'
          import struct, zlib, os

          def make_rgba_png(w, h, r=69, g=137, b=210, a=255):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              # color_type=6 means RGBA (4 channels)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0)
              raw = b''.join(b'\x00' + bytes([r, g, b, a] * w) for _ in range(h))
              idat = zlib.compress(raw)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')

          os.makedirs('src-tauri/icons', exist_ok=True)
          sizes = [
              (32,  32,  '32x32.png'),
              (128, 128, '128x128.png'),
              (256, 256, '128x128@2x.png'),
              (512, 512, 'icon.png'),
          ]
          for w, h, name in sizes:
              with open(f'src-tauri/icons/{name}', 'wb') as f:
                  f.write(make_rgba_png(w, h))
          print('RGBA icons generated successfully.')
          PYEOF
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "ZQ Master Bridge ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ------------------------------------------------------------------
  # Python agent sidecar checks
  # ------------------------------------------------------------------
  python-lint:
    name: Python agent lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint agents/
        run: ruff check agents/
